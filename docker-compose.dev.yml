services:
  planka-server:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: planka-dev-video-test
    pull_policy: never
    container_name: boards-server
    command: [ "bash", "-c", "if [ ! -f node_modules/.planka-dev-lock ] || ! sha256sum -c node_modules/.planka-dev-lock >/dev/null 2>&1; then npm install && npm rebuild bcrypt lodepng --build-from-source --force && sha256sum package-lock.json > node_modules/.planka-dev-lock; fi && npm run db:init && npm start" ]
    restart: on-failure
    dns:
      - 8.8.8.8
      - 1.1.1.1
    extra_hosts:
      - "smtp.bids.pt:127.0.0.1"
    volumes:
      - ./server:/app
      - server-node-modules:/app/node_modules
    ports:
      - 1337:1337
    environment:
      - BASE_URL=http://localhost:3008
      - DATABASE_URL=postgresql://postgres@postgres/planka
      - SECRET_KEY=notsecretkey
      - LOG_LEVEL=info
      - EMAIL_TEMPLATES_ENABLED=true
      - DEFAULT_ADMIN_EMAIL=admin@example.com
      - DEFAULT_ADMIN_PASSWORD=admin123
      - DEFAULT_ADMIN_NAME=Admin User
      - DEFAULT_ADMIN_USERNAME=admin
      - GLOBAL_NOTIFICATION_SERVICES=[{"url":"mailto://boards%40bids.pt:U31dc6FeXqSUVE@mail.bids.pt:587/?from=boards%40bids.pt&to=andre%40bids.pt","format":"html"}]
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-development}
      - SENTRY_RELEASE=${SENTRY_RELEASE:-}
      - SENTRY_TRACES_SAMPLE_RATE=${SENTRY_TRACES_SAMPLE_RATE:-0.1}
    healthcheck:
      test: [ "CMD", "node", "healthcheck.js" ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 120s
    depends_on:
      postgres:
        condition: service_healthy

  planka-client:
    image: planka-dev-video-test
    pull_policy: never
    container_name: boards-client
    command: [ "bash", "-c", "if [ ! -f node_modules/.planka-dev-lock ] || ! sha256sum -c node_modules/.planka-dev-lock >/dev/null 2>&1; then npm install && sha256sum package-lock.json > node_modules/.planka-dev-lock; fi && npx vite --host" ]
    restart: on-failure
    depends_on:
      planka-server:
        condition: service_healthy
    volumes:
      - ./client:/app
    ports:
      - 3008:3008
    environment:
      - VITE_SENTRY_DSN=${VITE_SENTRY_DSN:-}
      - VITE_SENTRY_ENVIRONMENT=${VITE_SENTRY_ENVIRONMENT:-development}
      - VITE_SENTRY_RELEASE=${VITE_SENTRY_RELEASE:-}
      - VITE_SENTRY_TRACES_SAMPLE_RATE=${VITE_SENTRY_TRACES_SAMPLE_RATE:-0.1}

  postgres:
    image: postgres:15-alpine
    container_name: boards-postgres
    restart: on-failure
    volumes:
      - postgres:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=planka
      - POSTGRES_USER=postgres
      - POSTGRES_HOST_AUTH_METHOD=trust
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres:
  server-node-modules:
